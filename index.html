<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Salary App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background: linear-gradient(135deg,#4CAF50,#2E7D32);margin:0;}
.header{color:white;text-align:center;padding:15px;font-size:18px;font-weight:bold;}
.container{padding:15px;padding-bottom:80px;}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px;background:#f1f1f1;}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px;background:#4CAF50;color:white;font-weight:bold;}
.delete-btn{background:red;}
.edit-btn{background:#2196F3;}
.app{display:none;background:white;height:100vh;border-radius:20px 20px 0 0;overflow:auto;}
.worker-block{background:white;padding:12px;margin:8px 0;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.bottom-menu{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:8px 0;}
.bottom-menu button{background:none;color:#333;font-size:22px;}
#calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.dayBox{background:#f5f5f5;padding:5px;border-radius:8px;text-align:center;}
.present{background:#4CAF50;color:#fff;}
.absent{background:#f44336;color:#fff;}

.dashboard{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.report-card{
background:white;
border-radius:15px;
padding:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-left:6px solid #4CAF50;
}

.report-title{
font-weight:bold;
font-size:16px;
margin-bottom:5px;
}

.month-line{
display:flex;
justify-content:space-between;
padding:6px;
background:#f5f5f5;
border-radius:10px;
margin-top:5px;
font-size:13px;
}

.badge{
background:#4CAF50;
color:white;
padding:3px 8px;
border-radius:8px;
font-size:12px;
}

.money{
color:#2E7D32;
font-weight:bold;
}

body.dark{
background: linear-gradient(135deg,#111,#222);
color:white;
}

body.dark .app{
background:#1e1e1e;
color:white;
}

body.dark .worker-block{
background:#2a2a2a;
color:white;
}

body.dark input,
body.dark select{
background:#333;
color:white;
}

body.dark button{
background:#444;
color:white;
}

body.dark .bottom-menu{
background:#1a1a1a;
}

body.dark .dayBox{
background:#333;
color:white;
}

body.dark .report-card{
background:#2a2a2a;
color:white;
}

body.dark .month-line{
background:#333;
color:white;
}
</style>
</head>

<body>

<div id="loginScreen">
<div class="header">Login</div>
<div class="container">
<input id="loginUser" placeholder="User">
<input id="loginPass" type="password">
<button onclick="login()">Login</button>
<button onclick="goRegister()">Register</button>
</div>
</div>

<div id="registerScreen" style="display:none;">
<div class="header">Register</div>
<div class="container">
<input id="regUser">
<input id="regPass" type="password">
<button onclick="register()">Create</button>
<button onclick="backToLogin()">Back</button>
</div>
</div>

<div id="app" class="app">

<!-- ADD / EDIT -->
<div id="screen1">
<div class="header">Salary App</div>
<div class="container">
<input id="dailyLimit" type="number" value="8">
<input id="name" placeholder="الاسم">
<input id="position" placeholder="الوظيفة">
<input id="salary" type="number" placeholder="الأجر">

<button onclick="saveWorker()" id="saveBtn">إضافة عامل</button>
<button onclick="logout()" style="background:red;">خروج</button>
</div>
</div>

<!-- WORKERS -->
<div id="screen2" style="display:none;">
<div class="header">العمال</div>
<div class="container">
<input id="searchWorker" placeholder="🔍 بحث" oninput="searchWorkers()">
<div id="workersList"></div>
</div>
</div>

<!-- CALENDAR -->
<div id="screen3" style="display:none;">
<div class="header">الحضور</div>
<div class="container">
<select id="month"></select>
<select id="year"></select>
<div id="calendar"></div>
</div>
</div>

<!-- SALARY -->
<div id="screen4" style="display:none;">
<div class="header">الأجور</div>
<div class="container">
<canvas id="salaryChart"></canvas>
<table border="1" width="100%">
<thead>
<tr>
<th>الاسم</th><th>الأجر</th><th>الوظيفة</th><th>الأيام</th><th>الساعات</th><th>المجموع</th>
</tr>
</thead>
<tbody id="salaryTable"></tbody>
</table>
<button onclick="downloadPDF()">PDF</button>
</div>
</div>

<!-- SCREEN 5: MONTHLY REPORT -->
<div id="screen5" style="display:none;">
<div class="header">📊 Dashboard التقارير الشهرية</div>

<div class="container">
<div id="monthlyTable"></div>
</div>
</div>

<div class="bottom-menu">
<button onclick="goHome()">🏠</button>
<button onclick="goWorkers()">👷</button>
<button onclick="goSalary()">📊</button>
<button onclick="goMonthly()">📅</button>
<button onclick="toggleDarkMode()">🌙</button>
</div>



</div>

<script>
let users=JSON.parse(localStorage.getItem("users")||"[]");
let currentUser=null;
let currentWorker=null;
let editIndex=null;
let chart=null;

function register(){
let u=regUser.value,p=regPass.value;
if(!u||!p)return alert("دخل المعلومات");
users.push({user:u,pass:p});
localStorage.setItem("users",JSON.stringify(users));
backToLogin();
}

function login(){
let f=users.find(x=>x.user===loginUser.value&&x.pass===loginPass.value);
if(f){
currentUser=f.user;
localStorage.setItem("loggedUser",currentUser);
loginScreen.style.display="none";
app.style.display="block";
renderWorkers();
initDateSelectors();
}
}

function logout(){localStorage.removeItem("loggedUser");location.reload();}
function goRegister(){loginScreen.style.display="none";registerScreen.style.display="block";}
function backToLogin(){registerScreen.style.display="none";loginScreen.style.display="block";}

function getWorkers(){return JSON.parse(localStorage.getItem("workers_"+currentUser)||"[]");}
function saveWorkers(w){localStorage.setItem("workers_"+currentUser,JSON.stringify(w));}

function toggleDarkMode(){
document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark");
}else{
localStorage.setItem("theme","light");
}
}

window.onload = function(){
currentUser = localStorage.getItem("loggedUser");

if(currentUser){
loginScreen.style.display="none";
app.style.display="block";
renderWorkers();
initDateSelectors();
}

// تحميل الثيم
if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}
}

function saveWorker(){

let nameVal = document.getElementById("name").value.trim();
let positionVal = document.getElementById("position").value.trim();
let salaryVal = document.getElementById("salary").value;
let limitVal = document.getElementById("dailyLimit").value;

// تحويل الأرقام
salaryVal = parseFloat(salaryVal);
let limit = parseFloat(limitVal);

// تحقق صحيح
if(nameVal === "" || positionVal === "" || isNaN(salaryVal)){
    alert("دخل المعلومات كاملة وبشكل صحيح");
    return;
}

// إلا limit ما مدخلش
if(isNaN(limit)) limit = 8;

let w = getWorkers();

if(editIndex === null){
    w.push({
        name: nameVal,
        position: positionVal,
        salary: salaryVal,
        dailyLimit: limit,
        calendar: {}
    });
}else{
    w[editIndex].name = nameVal;
    w[editIndex].position = positionVal;
    w[editIndex].salary = salaryVal;
    w[editIndex].dailyLimit = limit;
}

saveWorkers(w);
renderWorkers();

// تنظيف الفورم
document.getElementById("name").value = "";
document.getElementById("position").value = "";
document.getElementById("salary").value = "";
document.getElementById("dailyLimit").value = 8;

editIndex = null;
document.getElementById("saveBtn").innerText = "إضافة عامل";

alert("تم الحفظ بنجاح ✅");
}

function goMonthly(){
screen1.style.display="none";
screen2.style.display="none";
screen3.style.display="none";
screen4.style.display="none";
screen5.style.display="block";

buildMonthlyReport();
}

function buildMonthlyReport(){

let w = getWorkers();
let html = "";

w.forEach(x=>{

let months = {};

// جمع الشهور
Object.keys(x.calendar || {}).forEach(key=>{
let parts = key.split("-");
let m = parts[0];
let y = parts[1];
let mk = m + "/" + y;

if(!months[mk]){
months[mk] = {days:0,hours:0};
}

let v = x.calendar[key];

if(v.day === 1) months[mk].days++;
months[mk].hours += v.hours || 0;
});

// كارد ديال العامل
html += `
<div class="report-card">
<div class="report-title">👷 ${x.name} <span class="badge">${x.position}</span></div>
`;

Object.keys(months).forEach(mk=>{
let d = months[mk].days;
let h = months[mk].hours;
let total = (d + (h/(x.dailyLimit||8))) * x.salary;

html += `
<div class="month-line">
<span>📅 ${mk}</span>
<span>👷 ${d} أيام</span>
<span>⏱ ${h}h</span>
<span class="money">${total.toFixed(2)}</span>
</div>
`;
});

html += `</div>`;
});

monthlyTable.innerHTML = `<div class="dashboard">${html}</div>`;
}

function goHome(){screen1.style.display="block";screen2.style.display="none";screen3.style.display="none";screen4.style.display="none";screen5.style.display="none";}
function goWorkers(){screen1.style.display="none";screen2.style.display="block";screen3.style.display="none";screen4.style.display="none";screen5.style.display="none";renderWorkers();}
function goSalary(){screen1.style.display="none";screen2.style.display="none";screen3.style.display="none";screen4.style.display="block";screen5.style.display="none";updateSalary();}



function editWorker(i){
let w=getWorkers()[i];
name.value=w.name;
position.value=w.position;
salary.value=w.salary;
dailyLimit.value=w.dailyLimit;

editIndex=i;
saveBtn.innerText="تحديث العامل";
goHome();
}

function clearForm(){
name.value="";position.value="";salary.value="";
dailyLimit.value=8;
editIndex=null;
saveBtn.innerText="إضافة عامل";
}

function renderWorkers(){
let w=getWorkers();
workersList.innerHTML="";
w.forEach((x,i)=>{
workersList.innerHTML+=`
<div class="worker-block">
${x.name}<br>${x.position}<br>⏱ ${x.dailyLimit}h
<button onclick="openWorker(${i})">فتح</button>
<button class="edit-btn" onclick="editWorker(${i})">✏️ تعديل</button>
<button class="delete-btn" onclick="deleteWorker(${i})">حذف</button>
</div>`;
});
}

function searchWorkers(){
let k=searchWorker.value.toLowerCase();
let w=getWorkers();
workersList.innerHTML="";
w.filter(x=>x.name.toLowerCase().includes(k)||x.position.toLowerCase().includes(k))
.forEach(x=>{
let i=getWorkers().indexOf(x);
workersList.innerHTML+=`
<div class="worker-block">
${x.name}<br>${x.position}
<button onclick="openWorker(${i})">فتح</button>
<button onclick="editWorker(${i})">✏️</button>
</div>`;
});
}

function deleteWorker(i){
if(!confirm("متأكد؟"))return;
let w=getWorkers();w.splice(i,1);saveWorkers(w);renderWorkers();
}

function openWorker(i){
currentWorker=i;
screen1.style.display="none";
screen2.style.display="none";
screen3.style.display="block";
buildCalendar();
}

function initDateSelectors(){
for(let i=0;i<12;i++) month.innerHTML+=`<option value="${i}">${i+1}</option>`;
for(let i=2023;i<=2030;i++) year.innerHTML+=`<option>${i}</option>`;
month.value=new Date().getMonth();
year.value=new Date().getFullYear();
month.onchange=buildCalendar;
year.onchange=buildCalendar;
}

function buildCalendar(){
let worker=getWorkers()[currentWorker];
let m=parseInt(month.value);
let y=parseInt(year.value);

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

calendar.innerHTML="";

for(let i=0;i<first;i++)calendar.innerHTML+=`<div></div>`;

for(let d=1;d<=days;d++){
let key=m+"-"+y+"-"+d;
let data=worker.calendar[key]||{};
let cls=data.day===1?"present":(data.day===0?"absent":"");

calendar.innerHTML+=`
<div class="dayBox ${cls}">
${d}
<input type="number" value="${data.hours||''}" onchange="setHours('${key}',this.value)">
<button onclick="setDay('${key}',1)">✔</button>
<button onclick="setDay('${key}',0)">✖</button>
</div>`;
}
}

function setDay(key,val){
let w=getWorkers();
w[currentWorker].calendar[key]=w[currentWorker].calendar[key]||{};
w[currentWorker].calendar[key].day=val;
saveWorkers(w);
buildCalendar();
}

function setHours(key,v){
let w=getWorkers();
w[currentWorker].calendar[key]=w[currentWorker].calendar[key]||{};
w[currentWorker].calendar[key].hours=parseFloat(v)||0;
saveWorkers(w);
}

function updateSalary(){

let w = getWorkers();
salaryTable.innerHTML = "";

let names = [], totals = [];

// الشهر والسنة المختارين
let m = parseInt(document.getElementById("month").value);
let y = parseInt(document.getElementById("year").value);

w.forEach(x=>{
let d = 0, h = 0;

// نحسب غير الأيام ديال نفس الشهر
Object.keys(x.calendar || {}).forEach(key=>{
    let parts = key.split("-");
    let km = parseInt(parts[0]);
    let ky = parseInt(parts[1]);

    if(km === m && ky === y){
        let v = x.calendar[key];
        if(v.day === 1) d++;
        h += v.hours || 0;
    }
});

let total = (d + (h / (x.dailyLimit || 8))) * x.salary;

names.push(x.name);
totals.push(total);

salaryTable.innerHTML += `
<tr>
<td>${x.name}</td>
<td>${x.salary}</td>
<td>${x.position}</td>
<td>${d}</td>
<td>${h}</td>
<td>${total.toFixed(2)}</td>
</tr>`;
});

// تحديث chart
if(chart) chart.destroy();
chart = new Chart(salaryChart,{
    type:'bar',
    data:{
        labels:names,
        datasets:[{data:totals}]
    }
});
}

function downloadPDF(){
const { jsPDF }=window.jspdf;
let doc=new jsPDF();
let w=getWorkers();
let y=10;

w.forEach(x=>{
let d=0,h=0;
Object.values(x.calendar||{}).forEach(v=>{
if(v.day===1)d++;
h+=v.hours||0;
});
let total=(d+(h/(x.dailyLimit||8)))*x.salary;
doc.text(`${x.name}`,10,y);y+=6;
doc.text(`Total:${total.toFixed(2)}`,10,y);y+=10;
});

doc.save("report.pdf");
}

function goHome(){screen1.style.display="block";screen2.style.display="none";screen3.style.display="none";screen4.style.display="none";}
function goWorkers(){screen1.style.display="none";screen2.style.display="block";screen3.style.display="none";screen4.style.display="none";renderWorkers();}
function goSalary(){screen1.style.display="none";screen2.style.display="none";screen3.style.display="none";screen4.style.display="block";updateSalary();}

window.onload=function(){
currentUser=localStorage.getItem("loggedUser");
if(currentUser){
loginScreen.style.display="none";
app.style.display="block";
renderWorkers();
initDateSelectors();
}
}
</script>

</body>
</html>
